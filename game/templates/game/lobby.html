<!DOCTYPE html>
<html>
<head>
    <title>Lobby</title>
</head>
<body>
    <h1>Lobby</h1>
    <p>Current phase: {{ game.phase }}</p>

    <h2>Players</h2>
    <ul>
        {% for p in players %}
            <li>{{ p.user.username }} {% if p.is_ready %}(Ready){% endif %}</li>
        {% endfor %}
    </ul>

    <form method="post" action="{% url 'toggle_ready' %}">
        {% csrf_token %}
        <button type="submit">
            {% if player.is_ready %}Unready{% else %}Ready Up{% endif %}
        </button>
    </form>

    <form method="post" action="{% url 'start_game' %}">
        {% csrf_token %}
        <button type="submit">Start Game</button>
    </form>

    <p><a href="{% url 'logout' %}">Logout</a></p>
</body>
</html>
